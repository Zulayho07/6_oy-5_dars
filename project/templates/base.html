<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    {% include 'components/_style.html' %}

    <title>{{ title }}</title>
</head>
<body>

<div>
    {% include 'layout/navbar.html' %}

    <div class="mt-5">
        <nav class="nav nav-pills flex-column flex-sm-row">
            {% for brand in brands %}
            <a class="flex-sm-fill text-sm-center nav-link  {% if brand_id == brand.id %}active{% endif %}"
               href="{% url 'car_by_brand' brand.id %}">{{brand.title}}</a>
            {% endfor %}
        </nav>
    </div>
    <div class="mb-5 container" >
        {% block context %}
        {% endblock context %}
    </div>


    {% include 'layout/footer.html' %}
</div>

{% include 'components/_scripts.html' %}
</body>
</html>
